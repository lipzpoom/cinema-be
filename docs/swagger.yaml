basePath: /
definitions:
  models.Booking:
    properties:
      created_at:
        type: string
      id:
        type: string
      seats:
        items:
          type: string
        type: array
      showtime_id:
        type: string
      status:
        $ref: '#/definitions/models.BookingStatus'
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.BookingStatus:
    enum:
    - PENDING
    - SUCCESS
    - FAILED
    type: string
    x-enum-varnames:
    - BookingPending
    - BookingSuccess
    - BookingFailed
  models.Movie:
    properties:
      created_at:
        type: string
      description:
        type: string
      duration:
        type: integer
      id:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.Seat:
    properties:
      id:
        type: string
      seat_number:
        type: string
      showtime_id:
        type: string
      status:
        $ref: '#/definitions/models.SeatStatus'
    type: object
  models.SeatStatus:
    enum:
    - AVAILABLE
    - LOCKED
    - BOOKED
    type: string
    x-enum-varnames:
    - SeatAvailable
    - SeatLocked
    - SeatBooked
  models.Showtime:
    properties:
      created_at:
        type: string
      end_time:
        type: string
      id:
        type: string
      movie_id:
        type: string
      price:
        type: number
      start_time:
        type: string
      theater_number:
        type: string
      updated_at:
        type: string
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      google_id:
        type: string
      id:
        type: string
      img_profile:
        type: string
      name:
        type: string
      role:
        $ref: '#/definitions/models.UserRole'
      updated_at:
        type: string
    type: object
  models.UserRole:
    enum:
    - USER
    - ADMIN
    type: string
    x-enum-varnames:
    - RoleUser
    - RoleAdmin
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server for a movie ticket booking system.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Movie Ticket Booking API
  version: "1.0"
paths:
