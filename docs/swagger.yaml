    post:
      description: Login using Google Firebase idToken and returns a custom internal
        JWT
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Login with Google Provider
      tags:
      - Auth
  /api/auth/profile:
    get:
      description: Decodes the JWT to retrieve current logged in user information
      produces:
